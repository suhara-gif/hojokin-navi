name: Auto Merge Safe Changes

on:
  pull_request:
    types: [labeled]
  check_suite:
    types: [completed]

jobs:
  auto-merge:
    if: contains(github.event.pull_request.labels.*.name, 'safe-change')
    runs-on: ubuntu-latest

    steps:
      - name: Check if all checks passed
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            // Check statusesを確認
            const { data: statuses } = await github.rest.repos.getCombinedStatusForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha
            });

            if (statuses.state !== 'success') {
              console.log('Checks not passed yet, skipping auto-merge');
              return;
            }

            // すべてのチェックが通過していればマージ
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash',
                commit_title: pr.title,
                commit_message: `${pr.body}\n\nAuto-merged by safe-change workflow`
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: '✅ All checks passed. Auto-merged successfully!'
              });
            } catch (error) {
              console.error('Failed to auto-merge:', error);

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `⚠️ Auto-merge failed: ${error.message}\n\nPlease merge manually.`
              });
            }
