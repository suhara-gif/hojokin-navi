name: Weekly SEO Report

on:
  schedule:
    # 毎週月曜 JST 6:00 (日曜 UTC 21:00)
    - cron: '0 21 * * 0'
  workflow_dispatch: # 手動実行も可能

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run SEO Analysis
        id: analysis
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          if [ -z "$GSC_SERVICE_ACCOUNT_JSON" ]; then
            echo "⚠️ GSC_SERVICE_ACCOUNT_JSON not set, skipping SEO analysis"
            echo "skipped=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # SEO分析スクリプト実行
          npm run seo:analyze || echo "skipped=true" >> $GITHUB_OUTPUT

      - name: Create Issues for Low CTR Queries
        if: steps.analysis.outputs.skipped != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // 分析結果を読み込み（scripts/seo/analyze.tsが出力）
            if (!fs.existsSync('seo-report.json')) {
              console.log('No SEO report found');
              return;
            }

            const report = JSON.parse(fs.readFileSync('seo-report.json', 'utf8'));

            // CTR低クエリ（表示100回以上、CTR<5%）
            for (const query of report.lowCtrQueries || []) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[SEO] CTR改善: "${query.keyword}"`,
                labels: ['seo-title', 'auto-seo'],
                body: `## 📊 SEO分析結果

            **検索クエリ**: \`${query.keyword}\`
            **表示回数**: ${query.impressions}回
            **CTR**: ${query.ctr}%（目標: 5%以上）
            **平均順位**: ${query.position}位

            ## 💡 改善提案

            このクエリは表示回数が多いにも関わらずCTRが低い状態です。
            title/meta descriptionの最適化が必要です。

            ## 🤖 自動改善

            このIssueは自動改善ワークフローで処理されます。
            PRが自動生成されるまでお待ちください。

            ---
            Generated by Weekly SEO Report on ${new Date().toISOString().split('T')[0]}
            `
              });
            }

            // 11〜20位クエリ
            for (const query of report.rankImprovementQueries || []) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[SEO] 順位改善: "${query.keyword}"`,
                labels: ['seo-rank', 'auto-seo'],
                body: `## 📊 SEO分析結果

            **検索クエリ**: \`${query.keyword}\`
            **現在順位**: ${query.position}位
            **表示回数**: ${query.impressions}回
            **CTR**: ${query.ctr}%

            ## 💡 改善提案

            あと少しで1ページ目（10位以内）に入れるクエリです。
            コンテンツ強化と内部リンク最適化で順位向上を狙います。

            ## 🤖 自動改善

            このIssueは自動改善ワークフローで処理されます。
            PRが自動生成されるまでお待ちください。

            ---
            Generated by Weekly SEO Report on ${new Date().toISOString().split('T')[0]}
            `
              });
            }

            // ページなしクエリ
            for (const query of report.newPageQueries || []) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[SEO] 新規ページ検討: "${query.keyword}"`,
                labels: ['seo-newpage', 'auto-seo'],
                body: `## 📊 SEO分析結果

            **検索クエリ**: \`${query.keyword}\`
            **表示回数**: ${query.impressions}回
            **現状**: 該当ページなし

            ## 💡 改善提案

            このクエリで検索されていますが、該当する専用ページがありません。
            新規ページ作成を検討してください。

            ## 🤖 手動対応が必要

            新規ページ作成は手動で行う必要があります。
            このIssueをレビューして、作成要否を判断してください。

            ---
            Generated by Weekly SEO Report on ${new Date().toISOString().split('T')[0]}
            `
              });
            }

      - name: Create Summary Issue
        if: steps.analysis.outputs.skipped != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            if (!fs.existsSync('seo-report.json')) {
              return;
            }

            const report = JSON.parse(fs.readFileSync('seo-report.json', 'utf8'));

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📊 週次SEOレポート (${new Date().toISOString().split('T')[0]})`,
              labels: ['seo-report'],
              body: `## 📈 週次SEO分析結果

            **分析期間**: 過去7日間
            **サイト**: ${process.env.SITE_URL}

            ### サマリー

            - **CTR改善対象**: ${report.lowCtrQueries?.length || 0}件
            - **順位改善対象**: ${report.rankImprovementQueries?.length || 0}件
            - **新規ページ検討**: ${report.newPageQueries?.length || 0}件

            ### トップクエリ（表示回数順）

            ${report.topQueries?.slice(0, 10).map((q, i) =>
              \`\${i + 1}. **\${q.keyword}** - 順位: \${q.position}位, 表示: \${q.impressions}回, CTR: \${q.ctr}%\`
            ).join('\n') || 'データなし'}

            ### アクション

            - 🏷️ \`seo-title\` ラベル付きIssue → 自動改善PRが生成されます
            - 🏷️ \`seo-rank\` ラベル付きIssue → 自動改善PRが生成されます
            - 🏷️ \`seo-newpage\` ラベル付きIssue → 手動でページ作成を検討してください

            ### 次回分析

            次回は ${new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0]} に実行されます。

            ---
            Generated by Weekly SEO Report
            `
            });

      - name: Create alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: \`[ops-alert] Weekly SEO Report failed on \${new Date().toISOString().split('T')[0]}\`,
              labels: ['ops-alert'],
              body: \`Weekly SEO Report workflow failed. Check the logs: \${context.serverUrl}/\${context.repo.owner}/\${context.repo.repo}/actions/runs/\${context.runId}\`
            });
