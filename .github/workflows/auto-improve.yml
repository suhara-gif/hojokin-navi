name: Auto SEO Improvement

on:
  issues:
    types: [labeled]

jobs:
  auto-improve:
    # seo-title または seo-rank ラベルが付いた時のみ実行
    if: contains(github.event.issue.labels.*.name, 'seo-title') || contains(github.event.issue.labels.*.name, 'seo-rank')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Extract query from issue
        id: extract
        run: |
          # Issue本文から検索クエリを抽出
          QUERY=$(echo "${{ github.event.issue.body }}" | grep -oP '(?<=\*\*検索クエリ\*\*: `)[^`]+' || echo "")
          echo "query=$QUERY" >> $GITHUB_OUTPUT
          echo "issue_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT

      - name: Generate improvements with Claude
        if: steps.extract.outputs.query != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          QUERY: ${{ steps.extract.outputs.query }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "⚠️ ANTHROPIC_API_KEY not set, skipping auto-improvement"
            exit 0
          fi

          # Claude APIで改善案生成
          npm run seo:improve -- --query="$QUERY" --issue="${{ steps.extract.outputs.issue_number }}"

      - name: Create Pull Request
        if: steps.extract.outputs.query != ''
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            SEO改善: "${{ steps.extract.outputs.query }}"

            - title/meta description最適化
            - 内部リンク追加
            - コンテンツ強化

            Closes #${{ steps.extract.outputs.issue_number }}
          branch: seo-improve-${{ steps.extract.outputs.issue_number }}
          title: 'SEO改善: "${{ steps.extract.outputs.query }}"'
          body: |
            ## 🤖 自動SEO改善PR

            **Issue**: #${{ steps.extract.outputs.issue_number }}
            **検索クエリ**: `${{ steps.extract.outputs.query }}`

            ### 変更内容

            - ✅ title/meta descriptionの最適化
            - ✅ 検索意図に合わせたコンテンツ強化
            - ✅ 内部リンク追加

            ### 改善方針

            このPRは自動生成されました。
            Claude APIを使用して、検索クエリに最適化された変更を提案しています。

            ### レビューポイント

            - [ ] titleが検索クエリを含んでいるか
            - [ ] meta descriptionが魅力的か
            - [ ] コンテンツが検索意図に合っているか

            ### マージ基準

            - titleとmeta descriptionのみの変更の場合: `safe-change`ラベルで自動マージ
            - コンテンツ変更を含む場合: 手動レビュー必須

            ---
            Generated by Auto SEO Improvement workflow
          labels: |
            auto-seo
            seo-improvement

      - name: Add safe-change label if applicable
        if: steps.extract.outputs.query != ''
        uses: actions/github-script@v7
        with:
          script: |
            // PRが作成されたか確認
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: \`\${context.repo.owner}:seo-improve-${{ steps.extract.outputs.issue_number }}\`
            });

            if (prs.length === 0) return;

            const pr = prs[0];

            // 変更されたファイルを確認
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });

            // title/metaのみの変更かチェック
            const isSafeChange = files.every(file => {
              // layout.tsx, page.tsx, [id]/page.tsx のmetadata部分のみ
              return file.filename.match(/\/(layout|page)\.tsx?$/) &&
                     file.additions < 10; // 小規模な変更のみ
            });

            if (isSafeChange) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['safe-change']
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: '✅ このPRは安全な変更（title/meta のみ）と判定されました。CI通過後に自動マージされます。'
              });
            }

      - name: Comment on issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.extract.outputs.issue_number }},
              body: '⚠️ 自動改善PRの生成に失敗しました。ログを確認してください: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            });
